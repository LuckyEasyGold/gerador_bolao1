version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lotofacil_postgres
    environment:
      POSTGRES_DB: lotofacil
      POSTGRES_USER: lotofacil_user
      POSTGRES_PASSWORD: lotofacil_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotofacil_user -d lotofacil"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lotofacil_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
