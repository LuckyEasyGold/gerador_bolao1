services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: lotofacil_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://lotofacil_user:lotofacil_pass@postgres:5432/lotofacil
      - REDIS_URL=redis://redis:6379/0
    # --- OTIMIZAÇÃO DE MEMÓRIA ---
    deploy:
      resources:
        limits:
          memory: 512M
    # ----------------------------
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend # Mapeie apenas a pasta específica, não a raiz toda

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: lotofacil_frontend
    working_dir: /app/frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    # --- OTIMIZAÇÃO DE MEMÓRIA ---
    deploy:
      resources:
        limits:
          memory: 512M
    # ----------------------------
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend # Mapeie apenas a pasta específica
      - frontend_node_modules:/app/frontend/node_modules

  postgres:
    image: postgres:15-alpine
    container_name: lotofacil_postgres
    environment:
      POSTGRES_DB: lotofacil
      POSTGRES_USER: lotofacil_user
      POSTGRES_PASSWORD: lotofacil_pass
    ports:
      - "5432:5432"
    # --- OTIMIZAÇÃO DE MEMÓRIA ---
    deploy:
      resources:
        limits:
          memory: 256M
    # ----------------------------
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotofacil_user -d lotofacil"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lotofacil_redis
    ports:
      - "6379:6379"
    # --- OTIMIZAÇÃO DE MEMÓRIA ---
    deploy:
      resources:
        limits:
          memory: 128M
    # ----------------------------
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
  frontend_node_modules: